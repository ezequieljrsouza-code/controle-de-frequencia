<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Frequência</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── TEMA ESCURO ── */
[data-theme="dark"] {
  --bg:#0d0f14; --surface:#161920; --border:#252a35; --border2:#2e3545;
  --text:#e2e8f0; --text2:#94a3b8; --muted:#4b5563;
  --card-hover:#1c2030;
}
/* ── TEMA CLARO ── */
[data-theme="light"] {
  --bg:#f1f5f9; --surface:#ffffff; --border:#e2e8f0; --border2:#cbd5e1;
  --text:#0f172a; --text2:#64748b; --muted:#94a3b8;
  --card-hover:#f8fafc;
}
:root {
  --accent:#3b82f6; --accent2:#1d4ed8; --green:#22c55e; --red:#ef4444;
  --yellow:#f59e0b; --purple:#a855f7; --orange:#f97316; --cyan:#06b6d4;
  --teal:#14b8a6;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;transition:background 0.2s,color 0.2s;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.15);}
.header-icon{font-size:20px;}
.header-title{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--text);letter-spacing:-0.5px;}
.header-sub{font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:1px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{background:var(--accent);color:#fff;font-size:9px;font-family:var(--mono);font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:0.5px;}
.file-badge{border:1px solid var(--border2);color:var(--text2);font-size:9px;font-family:var(--mono);padding:3px 7px;border-radius:4px;background:transparent;}
.file-badge.ok{border-color:var(--green);color:var(--green);}

/* ICON BUTTONS */
.icon-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:14px;width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.upload-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:9px;font-weight:700;padding:5px 8px;border-radius:4px;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;white-space:nowrap;}
.upload-btn:hover{border-color:var(--accent);color:var(--accent);}
.upload-btn.syncing{border-color:var(--yellow)!important;color:var(--yellow)!important;pointer-events:none;}

/* MAIN */
.main{max-width:700px;margin:0 auto;padding:14px 12px;}

/* STEPS */
.step{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.step-label{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.step-label-left{display:flex;align-items:center;gap:6px;}
.step-num{background:var(--accent);color:#fff;width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}

/* BUTTONS */
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
.btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:7px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;}
.btn:hover{border-color:var(--accent);color:var(--text);}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.active-green{background:var(--green);border-color:var(--green);color:#fff;}
.btn.active-yellow{background:var(--yellow);border-color:var(--yellow);color:#000;}
.btn.active-red{background:var(--red);border-color:var(--red);color:#fff;}
.turno-btn{position:relative;}
.turno-btn.t1-active{background:#1e3a5f;border-color:var(--cyan);color:var(--cyan);}
.turno-btn.t2-active{background:#2d1b4e;border-color:var(--purple);color:var(--purple);}
.turno-btn.t3-active{background:#3b1f00;border-color:var(--orange);color:var(--orange);}
.turno-btn.all-active{background:var(--accent);border-color:var(--accent);color:#fff;}
[data-theme="light"] .turno-btn.t1-active{background:#e0f2fe;}
[data-theme="light"] .turno-btn.t2-active{background:#f3e8ff;}
[data-theme="light"] .turno-btn.t3-active{background:#fff7ed;}
.turno-badge{position:absolute;top:-5px;right:-5px;background:var(--border2);color:var(--text2);font-size:8px;font-family:var(--mono);font-weight:700;padding:1px 4px;border-radius:3px;min-width:16px;text-align:center;}
.turno-btn.t1-active .turno-badge{background:var(--cyan);color:#000;}
.turno-btn.t2-active .turno-badge{background:var(--purple);color:#fff;}
.turno-btn.t3-active .turno-badge{background:var(--orange);color:#000;}
.turno-btn.all-active .turno-badge{background:rgba(255,255,255,0.3);color:#fff;}

/* SELECT */
.sheet-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:9px 12px;cursor:pointer;appearance:none;}
.sheet-select:focus{outline:none;border-color:var(--accent);}
.sheet-select:disabled{opacity:0.5;cursor:not-allowed;}
option{background:var(--surface);}

/* SEARCH */
.filter-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
.filter-row input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;}
.filter-row input:focus{outline:none;border-color:var(--accent);}
.filter-row input::placeholder{color:var(--muted);}
.count-badge{font-family:var(--mono);font-size:11px;color:var(--text2);white-space:nowrap;}

/* PESSOA LIST — sem altura fixa, scroll natural */
.pessoa-list{margin-top:12px;display:flex;flex-direction:column;gap:5px;}

.pessoa-row{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:8px;padding:9px 10px;transition:all 0.15s;}
.pessoa-row:hover{background:var(--card-hover);}
.pessoa-row.t1{border-left-color:var(--cyan);}
.pessoa-row.t2{border-left-color:var(--purple);}
.pessoa-row.t3{border-left-color:var(--orange);}
.pessoa-row.pulmao-row{border-left-color:var(--teal)!important;background:#0a1f1e;}
[data-theme="light"] .pessoa-row.pulmao-row{background:#f0fdf9;}
[data-theme="light"] .pessoa-row.presente{background:#f0fdf4;}
.pessoa-row.ausente{background:#1f0a0a;border-left-color:var(--red)!important;}
[data-theme="light"] .pessoa-row.ausente{background:#fef2f2;}

.pessoa-nome{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tags{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.pessoa-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:0.5px;white-space:nowrap;}
.tag-x{background:#1e3a5f;color:#60a5fa;}
.tag-dsr{background:#451a03;color:var(--yellow);}
.tag-susp{background:#3b0a0a;color:#f87171;}
.tag-o{background:#1a2e1a;color:var(--green);}
.tag-t1{background:#0c2233;color:var(--cyan);}
.tag-t2{background:#1e1033;color:var(--purple);}
.tag-t3{background:#2d1500;color:var(--orange);}
.tag-pulmao{background:#0a2020;color:var(--teal);border:1px solid var(--teal);}
[data-theme="light"] .tag-x{background:#dbeafe;color:#1d4ed8;}
[data-theme="light"] .tag-dsr{background:#fef3c7;color:#92400e;}
[data-theme="light"] .tag-susp{background:#fee2e2;color:#991b1b;}
[data-theme="light"] .tag-t1{background:#e0f2fe;color:#0369a1;}
[data-theme="light"] .tag-t2{background:#f3e8ff;color:#6b21a8;}
[data-theme="light"] .tag-t3{background:#fff7ed;color:#9a3412;}

/* ABS button only */
.abs-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.12s;flex-shrink:0;}
.abs-btn:hover{border-color:var(--red);color:var(--red);}
.abs-btn.marked{background:var(--red);border-color:var(--red);color:#fff;}

/* P (presente) button */
.p-btn{font-family:var(--mono);font-size:10px;font-weight:700;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.12s;flex-shrink:0;}
.p-btn:hover{border-color:var(--green);color:var(--green);}
.p-btn.marked{background:var(--green);border-color:var(--green);color:#fff;}

/* justificativa */
.just-select{font-family:var(--mono);font-size:10px;background:var(--bg);border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:3px 5px;cursor:pointer;max-width:85px;flex-shrink:0;}
[data-theme="light"] .just-select{background:var(--surface);}

/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:12px;}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:700;}
.stat-lbl{font-size:9px;color:var(--text2);margin-top:2px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;}
.stat-green{color:var(--green);} .stat-red{color:var(--red);} .stat-blue{color:var(--accent);} .stat-teal{color:var(--teal);}

/* REPORT BTN */
.report-btn{width:100%;background:var(--accent);border:none;color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;padding:13px;border-radius:8px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
.report-btn:hover{background:var(--accent2);}

/* SAVE indicator */
.save-indicator{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;padding:6px 0;display:flex;align-items:center;justify-content:center;gap:6px;}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.save-dot.saving{background:var(--yellow);animation:pulse 1s infinite;}
.save-dot.saved{background:var(--green);}
.save-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:480px;padding:24px;}
.modal-title{font-family:var(--mono);font-weight:700;font-size:15px;margin-bottom:16px;}
.modal-pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;color:var(--text);white-space:pre-wrap;max-height:360px;overflow-y:auto;margin-bottom:16px;line-height:1.7;}
.modal-btns{display:flex;gap:10px;}
.modal-btn{flex:1;padding:10px;border-radius:7px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;}
.modal-btn.copy{background:var(--accent);border-color:var(--accent);color:#fff;}
.modal-btn.copy:hover{background:var(--accent2);}
.modal-btn.close-btn{background:transparent;border-color:var(--border2);color:var(--text2);}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(13,15,20,0.93);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-overlay.hidden{display:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:var(--mono);font-size:13px;color:var(--text2);}
.loading-sub{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;max-width:300px;}

.divider{height:1px;background:var(--border);margin:12px 0;}
.last-sync{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;padding:6px 0 2px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Carregando planilha...</div>
  <div class="loading-sub" id="loadingSub">Processando dados</div>
</div>

<div class="header">
  <span class="header-icon">📋</span>
  <div>
    <div class="header-title">CONTROLE DE FREQUÊNCIA</div>
    <div class="header-sub">Analista: Ezequiel Miranda</div>
  </div>
  <div class="header-right">
    <span class="file-badge ok" id="fileBadge">✓</span>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
    <button class="upload-btn" onclick="document.getElementById('xlsxInput').click()">↑ ATUALIZAR</button>
    <button class="upload-btn" id="sheetsBtn" onclick="syncFromSheets()" style="border-color:var(--green);color:var(--green)">↓ SHEETS</button>
    <input type="file" id="xlsxInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileUpload(event)">
    <span class="badge">WR ESCALAS</span>
  </div>
</div>

<div class="main">

  <div class="step">
    <div class="step-label"><span class="step-label-left"><span class="step-num">1</span> Selecionar Guia</span></div>
    <div class="btn-group" id="sheetButtons"></div>
  </div>

  <div class="step">
    <div class="step-label"><span class="step-label-left"><span class="step-num">2</span> Dia da Semana</span></div>
    <div class="btn-group" id="dayButtons">
      <button class="btn" onclick="selectDay('SEG')">SEG</button>
      <button class="btn" onclick="selectDay('TER')">TER</button>
      <button class="btn" onclick="selectDay('QUA')">QUA</button>
      <button class="btn" onclick="selectDay('QUI')">QUI</button>
      <button class="btn" onclick="selectDay('SEX')">SEX</button>
      <button class="btn" onclick="selectDay('SAB')">SAB</button>
      <button class="btn" onclick="selectDay('DOM')">DOM</button>
    </div>
  </div>

  <div class="step">
    <div class="step-label"><span class="step-label-left"><span class="step-num">3</span> Turno</span></div>
    <div class="btn-group">
      <button class="btn turno-btn all-active" id="tbtn-ALL" onclick="selectTurno('ALL')">TODOS <span class="turno-badge" id="tbadge-ALL">0</span></button>
      <button class="btn turno-btn" id="tbtn-T1" onclick="selectTurno('T1')">T1 <span class="turno-badge" id="tbadge-T1">0</span></button>
      <button class="btn turno-btn" id="tbtn-T2" onclick="selectTurno('T2')">T2 <span class="turno-badge" id="tbadge-T2">0</span></button>
      <button class="btn turno-btn" id="tbtn-T3" onclick="selectTurno('T3')">T3 <span class="turno-badge" id="tbadge-T3">0</span></button>
    </div>
  </div>

  <div class="step">
    <div class="step-label"><span class="step-label-left"><span class="step-num">4</span> Filtrar por Escala do Dia</span></div>
    <div class="btn-group">
      <button class="btn active" id="btn-ALL"  onclick="selectType('ALL')">TODOS</button>
      <button class="btn"        id="btn-X"    onclick="selectType('X')">Escalados</button>
      <button class="btn"        id="btn-DSR"  onclick="selectType('DSR')">DSR</button>
      <button class="btn"        id="btn-SUSP" onclick="selectType('SUSP.')">SUSP.</button>
    </div>
  </div>

  <div id="lista-section" style="display:none">
    <div class="stats-row" id="statsRow"></div>

    <div class="step">
      <div class="step-label">
        <span class="step-label-left"><span class="step-num">5</span> Lista de Chamada</span>
        <span class="count-badge" id="countBadge"></span>
      </div>
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="Buscar nome..." oninput="renderPessoas()">
      </div>
      <div class="divider"></div>
      <div class="pessoa-list" id="pessoaList"></div>
    </div>

    <div class="save-indicator" id="saveIndicator">
      <div class="save-dot" id="saveDot"></div>
      <span id="saveText">pronto</span>
    </div>

    <button class="report-btn" onclick="gerarRelatorio()">📋 GERAR RELATÓRIO WHATSAPP</button>
  </div>

  <div class="last-sync" id="lastSync"></div>
</div>

<div class="modal-bg" id="reportModal">
  <div class="modal">
    <div class="modal-title">📱 Relatório Pronto</div>
    <pre class="modal-pre" id="reportText"></pre>
    <div class="modal-btns">
      <button class="modal-btn copy"      onclick="copyReport()">Copiar Texto</button>
      <button class="modal-btn close-btn" onclick="closeModal()">Fechar</button>
    </div>
  </div>

// ── Firebase config ────────────────────────────────────────────────────────────
var FB_URL = 'https://controledefrequencia-4972c-default-rtdb.firebaseio.com';

function fbKey() {
  // Key: sheet + day + turno + type
  var k = (selectedSheet + '_' + selectedDay + '_' + selectedTurno + '_' + selectedType)
    .replace(/[^a-zA-Z0-9_-]/g, '_');
  return k;
}

var saveTimer = null;

function scheduleFirebaseSave() {
  clearTimeout(saveTimer);
  setSaveState('saving', 'salvando...');
  saveTimer = setTimeout(function() { saveToFirebase(); }, 800);
}

function setSaveState(state, text) {
  var dot  = document.getElementById('saveDot');
  var txt  = document.getElementById('saveText');
  dot.className = 'save-dot ' + state;
  txt.textContent = text;
}

function saveToFirebase() {
  if (!selectedSheet || !selectedDay) return;
  var key  = fbKey();
  var data = {};
  Object.keys(presencaMap).forEach(function(k) {
    var e = presencaMap[k];
    if (e && (e.status === 'A' || e.status === 'P')) {
      data[k.replace(/[.#$\[\]]/g, '_')] = { status: e.status, just: e.just || 'Injustificado' };
    }
  });

  fetch(FB_URL + '/presenca/' + key + '.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(function(r) { return r.json(); })
  .then(function() { setSaveState('saved', 'salvo na nuvem ✓'); })
  .catch(function() { setSaveState('error', 'erro ao salvar'); });
}

function loadFromFirebase(callback) {
  if (!selectedSheet || !selectedDay) { callback({}); return; }
  var key = fbKey();
  fetch(FB_URL + '/presenca/' + key + '.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // Rebuild presencaMap from firebase — only ABS stored
      presencaMap = {};
      if (data && typeof data === 'object') {
        Object.keys(data).forEach(function(k) {
          // Restore original key (we saved with _ replacing special chars)
          presencaMap[k] = { status: data[k].status || 'A', just: data[k].just || 'Injustificado' };
        });
      }
      callback(presencaMap);
    })
    .catch(function() { callback({}); });
}

// ── XLSX ──────────────────────────────────────────────────────────────────────
var ESCALA_DATA   = {};
var selectedSheet = '';
var selectedDay   = '';
var selectedType  = 'ALL';
var selectedTurno = 'ALL';
var presencaMap   = {};

function processWorkbook(wb) {
  ESCALA_DATA = {};
  var loaded = 0;
  wb.SheetNames.forEach(function(name) {
    var ws   = wb.Sheets[name];
    var rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
    if (!rows || rows.length < 2) return;
    var headerRow = -1;
    for (var i = 0; i < Math.min(rows.length, 5); i++) {
      var j = rows[i].join('|').toUpperCase();
      if (j.indexOf('NOME') >= 0 && j.indexOf('SEG') >= 0) { headerRow = i; break; }
    }
    if (headerRow === -1) return;
    var headers = rows[headerRow].map(function(h) { return String(h).toUpperCase().trim(); });
    function ci(lbl) { var i = headers.indexOf(lbl); return i >= 0 ? i : -1; }
    var nomeIdx  = ci('NOME');
    var turnoIdx = ci('TURNO');
    var prodIdx  = ci('PRODUTIVO ?');
    var dayIdx   = { SEG:ci('SEG'),TER:ci('TER'),QUA:ci('QUA'),QUI:ci('QUI'),SEX:ci('SEX'),SAB:ci('SAB'),DOM:ci('DOM') };
    if (nomeIdx === -1) return;
    var records = [];
    for (var r = headerRow+1; r < rows.length; r++) {
      var row  = rows[r];
      var nome = String(row[nomeIdx]||'').trim();
      if (!nome) continue;
      var prod  = String(prodIdx >= 0 && row[prodIdx] ? row[prodIdx] : '').toUpperCase();
      var turno = String(turnoIdx >= 0 && row[turnoIdx] ? row[turnoIdx] : '').trim();
      var days  = {};
      Object.keys(dayIdx).forEach(function(d) {
        days[d] = dayIdx[d] >= 0 ? String(row[dayIdx[d]]||'').trim() : '';
      });
      records.push({ nome:nome, turno:turno, pulmao: prod.indexOf('PULM') >= 0, days:days });
    }
    if (records.length > 0) { ESCALA_DATA[name] = records; loaded++; }
  });
  return loaded;
}

function populateSheetSelect() {
  var container = document.getElementById('sheetButtons');
  container.innerHTML = '';
  Object.keys(ESCALA_DATA).forEach(function(name) {
    var btn = document.createElement('button');
    btn.className = 'btn sheet-btn' + (name === selectedSheet ? ' active' : '');
    btn.setAttribute('data-sheet', name);
    btn.textContent = name;
    btn.onclick = function() { selectSheet(name); };
    container.appendChild(btn);
  });
}

function selectSheet(name) {
  // Save current presencaMap before switching
  if (selectedSheet && selectedDay) {
    presencaCache[fbKey()] = presencaMap;
  }
  selectedSheet = name;
  // Update button states
  document.querySelectorAll('.sheet-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-sheet') === name);
  });
  var key = fbKey();
  presencaMap = presencaCache[key] ? presencaCache[key] : {};
  updateTurnoCounts();
  refreshLista();
}


function saveXlsxToFirebase(filename) {
  setSaveState('saving', 'salvando base...');
  var meta = { filename: filename, updatedAt: new Date().toISOString(), sheets: Object.keys(ESCALA_DATA) };
  // Save metadata
  fetch(FB_URL + '/metadata.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(meta)
  }).catch(function() {});
  // FIRST: wipe /escalas completely so old sheets (ex W14) don't persist
  fetch(FB_URL + '/escalas.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: 'null'
  })
  .then(function() {
    // THEN: write each sheet of the new workbook
    var promises = Object.keys(ESCALA_DATA).map(function(sheetName) {
      var key = sheetName.replace(/[.#$\[\]]/g, '_');
      return fetch(FB_URL + '/escalas/' + key + '.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ESCALA_DATA[sheetName])
      });
    });
    return Promise.all(promises);
  })
  .then(function() { setSaveState('saved', 'base salva na nuvem ✓'); })
  .catch(function() { setSaveState('error', 'erro ao salvar base'); });
}

function loadEscalaFromFirebase(callback) {
  setSaveState('saving', 'verificando nuvem...');
  // First check metadata to compare with embedded build
  fetch(FB_URL + '/metadata.json', { cache: 'no-cache' })
    .then(function(r) { return r.json(); })
    .then(function(meta) {
      if (!meta || !meta.sheets) { callback(false); return; }
      // Compare Firebase sheet list with embedded xlsx sheets
      var embeddedSheets = Object.keys(EMBEDDED_SHEETS);
      var fbSheets = meta.sheets;
      // If Firebase has same or more sheets matching embedded, use Firebase
      var fbUpToDate = embeddedSheets.every(function(s) {
        return fbSheets.indexOf(s) >= 0 || fbSheets.indexOf(s.replace(/[.#$\[\]]/g,'_')) >= 0;
      });
      if (!fbUpToDate) {
        // Firebase is outdated — use embedded and push it to Firebase
        setSaveState('saved', 'base local mais recente');
        callback(false);
        return;
      }
      // Firebase is current — load full escalas
      fetch(FB_URL + '/escalas.json', { cache: 'no-cache' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && typeof data === 'object' && Object.keys(data).length > 0) {
            ESCALA_DATA = data;
            setSaveState('saved', 'base carregada da nuvem ✓');
            callback(true);
          } else {
            callback(false);
          }
        })
        .catch(function() { callback(false); });
    })
    .catch(function() { callback(false); });
}

function finishLoad() {
  var loaded = Object.keys(ESCALA_DATA).length;
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('fileBadge').textContent = '✓ ' + loaded + ' guias';
  populateSheetSelect();
  var firstSheet = Object.keys(ESCALA_DATA)[0];
  if (firstSheet) {
    selectedSheet = firstSheet;
  }
  var dm = {0:'DOM',1:'SEG',2:'TER',3:'QUA',4:'QUI',5:'SEX',6:'SAB'};
  selectDay(dm[new Date().getDay()]);
}

function loadEmbedded() {
  document.getElementById('loadingSub').textContent = 'Lendo base local...';
  // Pre-process embedded xlsx to know its sheet names before comparing with Firebase
  try {
    var wb0 = XLSX.read(XLSX_B64, { type:'base64' });
    var tempData = {};
    wb0.SheetNames.forEach(function(n) { tempData[n] = true; });
    EMBEDDED_SHEETS = tempData;
  } catch(e) {}
  document.getElementById('loadingSub').textContent = 'Verificando nuvem...';
  // Try Firebase first
  loadEscalaFromFirebase(function(found) {
    if (found) {
      var loaded = Object.keys(ESCALA_DATA).length;
      document.getElementById('lastSync').textContent = 'Base carregada da nuvem — ' + loaded + ' guias';
      finishLoad();
    } else {
      // Fallback to embedded xlsx
      try {
        document.getElementById('loadingSub').textContent = 'Carregando base local...';
        var wb = XLSX.read(XLSX_B64, { type:'base64' });
        processWorkbook(wb);
        // Store embedded sheet names for future version comparison
        EMBEDDED_SHEETS = {};
        Object.keys(ESCALA_DATA).forEach(function(k) { EMBEDDED_SHEETS[k] = true; });
        document.getElementById('lastSync').textContent = Object.keys(ESCALA_DATA).length + ' guias (base local)';
        finishLoad();
      } catch(e) {
        document.getElementById('loadingOverlay').classList.add('hidden');
        console.error(e);
      }
    }
  });
}

function handleFileUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  document.getElementById('loadingOverlay').classList.remove('hidden');
  document.getElementById('loadingSub').textContent = 'Lendo ' + file.name + '...';
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb     = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      var loaded = processWorkbook(wb);
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('fileBadge').textContent = '✓ ' + loaded + ' guias';
      document.getElementById('lastSync').textContent  = file.name + ' — ' + loaded + ' guias';
      presencaMap = {}; selectedSheet = '';
      document.getElementById('lista-section').style.display = 'none';
      saveXlsxToFirebase(file.name);
      populateSheetSelect();
      var firstSheet = Object.keys(ESCALA_DATA)[0];
      if (firstSheet) {
        selectedSheet = firstSheet;
        updateTurnoCounts();
        refreshLista();
      }
    } catch(err) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      alert('Erro: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

// ── UI ────────────────────────────────────────────────────────────────────────
var presencaCache = {}; // stores presencaMap per fbKey
var EMBEDDED_SHEETS = {}; // sheet names from embedded xlsx for version check

function onSheetChange() {
  // Legacy — now handled by selectSheet()
}

function selectDay(day) {
  // Save current presencaMap before switching day
  if (selectedSheet && selectedDay) {
    presencaCache[fbKey()] = presencaMap;
  }
  selectedDay = day;
  document.querySelectorAll('#dayButtons .btn').forEach(function(b) {
    b.classList.remove('active');
    if (b.textContent.trim() === day) b.classList.add('active');
  });
  // Restore cached presencaMap for new context
  var key = fbKey();
  presencaMap = presencaCache[key] ? presencaCache[key] : {};
  updateTurnoCounts();
  refreshLista();
}

function selectTurno(t) {
  selectedTurno = t;
  ['ALL','T1','T2','T3'].forEach(function(x) {
    var el = document.getElementById('tbtn-'+x);
    if (el) el.classList.remove('all-active','t1-active','t2-active','t3-active');
  });
  var el = document.getElementById('tbtn-'+t);
  if (el) el.classList.add(t==='ALL'?'all-active':t.toLowerCase()+'-active');
  refreshLista();
}

function selectType(type) {
  selectedType = type;
  ['ALL','X','DSR','SUSP.'].forEach(function(t) {
    var id = t==='SUSP.'?'btn-SUSP':'btn-'+t;
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('active','active-green','active-yellow','active-red');
    if (t===type) {
      if (t==='X') el.classList.add('active-green');
      else if (t==='DSR') el.classList.add('active-yellow');
      else if (t==='SUSP.') el.classList.add('active-red');
      else el.classList.add('active');
    }
  });
  refreshLista();
}

function updateTurnoCounts() {
  if (!selectedSheet || !ESCALA_DATA[selectedSheet]) return;
  var counts = { ALL:0, T1:0, T2:0, T3:0 };
  ESCALA_DATA[selectedSheet].forEach(function(p) {
    if (selectedDay && selectedType!=='ALL' && (p.days[selectedDay]||'')!==selectedType) return;
    counts.ALL++;
    var t = (p.turno||'').toUpperCase();
    if (counts[t]!==undefined) counts[t]++;
  });
  ['ALL','T1','T2','T3'].forEach(function(t) {
    var el = document.getElementById('tbadge-'+t);
    if (el) el.textContent = counts[t];
  });
}

function refreshLista() {
  if (!selectedSheet || !selectedDay || !ESCALA_DATA[selectedSheet]) {
    document.getElementById('lista-section').style.display = 'none';
    return;
  }
  var key = fbKey();
  // If already cached in session, render immediately without Firebase round-trip
  if (presencaCache[key] !== undefined) {
    presencaMap = presencaCache[key];
    document.getElementById('lista-section').style.display = 'block';
    document.getElementById('searchInput').value = '';
    updateTurnoCounts();
    renderPessoas();
    setSaveState('saved', 'pronto');
    return;
  }
  // First visit for this key — load from Firebase
  setSaveState('saving', 'carregando...');
  loadFromFirebase(function() {
    presencaCache[key] = presencaMap; // cache after load
    document.getElementById('lista-section').style.display = 'block';
    document.getElementById('searchInput').value = '';
    updateTurnoCounts();
    renderPessoas();
    setSaveState('saved', 'dados carregados ✓');
  });
}

function getPessoas() {
  return (ESCALA_DATA[selectedSheet]||[]).filter(function(p) {
    var val = p.days[selectedDay]||'';
    return (selectedTurno==='ALL'||(p.turno||'').toUpperCase()===selectedTurno)
        && (selectedType ==='ALL'||val===selectedType);
  });
}

function renderPessoas() {
  var search   = document.getElementById('searchInput').value.toUpperCase();
  var all      = getPessoas();
  var filtered = all.filter(function(p) { return p.nome.toUpperCase().indexOf(search) >= 0; });

  document.getElementById('countBadge').textContent = filtered.length + ' pessoas';
  var list = document.getElementById('pessoaList');
  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:32px 20px;color:var(--muted);font-size:13px;font-family:var(--mono)"><div style="font-size:28px;margin-bottom:8px">🔎</div>Nenhuma pessoa encontrada</div>';
    renderStats(); return;
  }

  filtered.forEach(function(p) {
    var key    = p.nome;
    var estado = presencaMap[key] || { status: null, just: 'Injustificado' };
    var dayVal = p.days[selectedDay]||'';
    var turno  = (p.turno||'').toUpperCase();
    var tagCls = dayVal==='DSR'?'tag-dsr':dayVal==='SUSP.'?'tag-susp':dayVal==='O'?'tag-o':'tag-x';
    var tCls   = turno==='T2'?'tag-t2':turno==='T3'?'tag-t3':'tag-t1';
    var rowCls = turno.toLowerCase();
    if (p.pulmao)            rowCls += ' pulmao-row';
    if (estado.status==='P') rowCls += ' presente';
    if (estado.status==='A') rowCls += ' ausente';

    var justHtml = '';
    if (estado.status === 'A') {
      var opts = ['Injustificado','Atestado','Declaracao','Suspensao','Atraso'];
      justHtml = '<select class="just-select" data-key="'+key+'" onchange="updateJust(this)">';
      opts.forEach(function(o) { justHtml += '<option value="'+o+'"'+(estado.just===o?' selected':'')+'>'+o+'</option>'; });
      justHtml += '</select>';
    }

    var isAbs = estado.status === 'A';
    var isP   = estado.status === 'P';
    var div = document.createElement('div');
    div.className = 'pessoa-row ' + rowCls;
    div.innerHTML =
      '<span class="pessoa-nome">'+p.nome+'</span>'
      +'<div class="tags">'
      +(p.pulmao?'<span class="pessoa-tag tag-pulmao">🫁 PULMÃO</span>':'')
      +'<span class="pessoa-tag '+tCls+'">'+turno+'</span>'
      +'<span class="pessoa-tag '+tagCls+'">'+dayVal+'</span>'
      +'</div>'
      +justHtml
      +'<div style="display:flex;gap:4px;flex-shrink:0">'
      +'<button class="p-btn'+(isP?' marked':'')+'" data-key="'+key+'" onclick="toggleP(this)">P</button>'
      +'<button class="abs-btn'+(isAbs?' marked':'')+'" data-key="'+key+'" onclick="toggleAbs(this)">ABS</button>'
      +'</div>';
    list.appendChild(div);
  });
  renderStats();
}

function toggleP(btn) {
  var key = btn.getAttribute('data-key');
  if (!presencaMap[key]) presencaMap[key] = { status: null, just: 'Injustificado' };
  presencaMap[key].status = presencaMap[key].status === 'P' ? null : 'P';
  scheduleFirebaseSave();
  renderPessoas();
}

function toggleAbs(btn) {
  var key = btn.getAttribute('data-key');
  if (!presencaMap[key]) presencaMap[key] = { status: null, just: 'Injustificado' };
  presencaMap[key].status = presencaMap[key].status === 'A' ? null : 'A';
  scheduleFirebaseSave();
  renderPessoas();
}

function updateJust(sel) {
  var key = sel.getAttribute('data-key');
  if (!presencaMap[key]) presencaMap[key] = { status:'A', just: sel.value };
  else presencaMap[key].just = sel.value;
  scheduleFirebaseSave();
}

function renderStats() {
  var all = getPessoas();
  var a=0, pl=0, esc=0;
  all.forEach(function(x) {
    var e = presencaMap[x.nome];
    if (e && e.status==='A') a++;
    else if (e && e.status==='P') esc++;
    else esc++;
    if (x.pulmao) pl++;
  });
  var absReal = Math.max(0, a - pl);
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-box"><div class="stat-val stat-blue">'+all.length+'</div><div class="stat-lbl">Total</div></div>'
    +'<div class="stat-box"><div class="stat-val stat-green">'+esc+'</div><div class="stat-lbl">Presentes</div></div>'
    +'<div class="stat-box"><div class="stat-val stat-red">'+a+'</div><div class="stat-lbl">ABS</div></div>'
    +'<div class="stat-box"><div class="stat-val stat-teal">'+absReal+'</div><div class="stat-lbl">ABS Real</div></div>';
}

function gerarRelatorio() {
  var hoje = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
  var all  = getPessoas();
  var absN=[],plList=[],plP=0;
  all.forEach(function(p) {
    var e=presencaMap[p.nome],st=e?e.status:null,just=e?(e.just||'Injustificado'):'Injustificado';
    if (p.pulmao) {
      if (st==='A') plList.push('- '+p.nome+' ❌ ('+just+')');
      else          { plList.push('- '+p.nome+' ✅'); plP++; }
    } else { if (st==='A') absN.push('- '+p.nome+' ('+just+')'); }
  });
  var absReal = Math.max(0, absN.length - plP);
  var r = '*ABS ('+hoje+')*\n\nABS\n';
  r += absN.length  ? absN.join('\n')+'\n'   : 'Nenhum\n';
  r += '\nPulmões 🫁\n';
  r += plList.length? plList.join('\n')+'\n' : 'Nenhum\n';
  r += '\nABS Real: '+absReal;
  document.getElementById('reportText').textContent = r;
  document.getElementById('reportModal').classList.add('open');
}

function copyReport() {
  navigator.clipboard.writeText(document.getElementById('reportText').textContent);
  var btn = document.querySelector('.modal-btn.copy');
  btn.textContent = 'Copiado!';
  setTimeout(function() { btn.textContent = 'Copiar Texto'; }, 1500);
}

function closeModal() { document.getElementById('reportModal').classList.remove('open'); }

  var isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';

function syncFromSheets() {
  var btn = document.getElementById('sheetsBtn');
  btn.classList.add('syncing');
  btn.textContent = '↓ buscando...';
  document.getElementById('loadingOverlay').classList.remove('hidden');
  document.getElementById('loadingSub').textContent = 'Buscando dados do Google Sheets...';

  var PUB_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT0VjH06MWmRz4Mg6lZoyx9CJbY2yniWsDK-bpGV5CxFvU9-mboUxvCwsf-Q8sm1llT3G1_vzBuIjds/pub';

  // Sheet names to try fetching (same as current workbook + common ones)
  var sheetNames = ['W15-2026','W16-2026','W17-2026','W18-2026','W19-2026','W20-2026','W21-2026','W22-2026','W23-2026','W24-2026','W14-2026','INDIRETOS','QRS EXT','LMS'];

  function fetchCSV(name) {
    return fetch(PUB_BASE + '?single=true&output=csv&sheet=' + encodeURIComponent(name), { cache:'no-cache' })
      .then(function(r) { if (!r.ok) throw new Error('skip'); return r.text(); });
  }

  function parseCSV(text) {
    return text.split(/\r?\n/).map(function(line) {
      var fields=[], cur='', inQ=false;
      for (var i=0; i<line.length; i++) {
        var ch=line[i];
        if (ch==='"') { inQ=!inQ; }
        else if (ch===',' && !inQ) { fields.push(cur.trim()); cur=''; }
        else { cur+=ch; }
      }
      fields.push(cur.trim());
      return fields;
    });
  }

  function processCSVRows(rows) {
    if (!rows || rows.length < 2) return [];
    var headerRow=-1;
    for (var i=0; i<Math.min(rows.length,5); i++) {
      var j=rows[i].join('|').toUpperCase();
      if (j.indexOf('NOME')>=0 && j.indexOf('SEG')>=0) { headerRow=i; break; }
    }
    if (headerRow===-1) return [];
    var headers=rows[headerRow].map(function(h){return String(h).toUpperCase().trim();});
    function ci(lbl){var i=headers.indexOf(lbl);return i>=0?i:-1;}
    var nomeIdx=ci('NOME'), turnoIdx=ci('TURNO'), prodIdx=ci('PRODUTIVO ?');
    var dayIdx={SEG:ci('SEG'),TER:ci('TER'),QUA:ci('QUA'),QUI:ci('QUI'),SEX:ci('SEX'),SAB:ci('SAB'),DOM:ci('DOM')};
    if (nomeIdx===-1) return [];
    var records=[];
    for (var r=headerRow+1; r<rows.length; r++) {
      var row=rows[r];
      var nome=String(row[nomeIdx]||'').trim();
      if (!nome) continue;
      var prod=String(prodIdx>=0&&row[prodIdx]?row[prodIdx]:'').toUpperCase();
      var turno=String(turnoIdx>=0&&row[turnoIdx]?row[turnoIdx]:'').trim();
      var days={};
      Object.keys(dayIdx).forEach(function(d){days[d]=dayIdx[d]>=0?String(row[dayIdx[d]]||'').trim():'';});
      records.push({nome:nome,turno:turno,pulmao:prod.indexOf('PULM')>=0,days:days});
    }
    return records;
  }

  var newData = {};
  var done=0, total=sheetNames.length;

  var promises = sheetNames.map(function(name) {
    return fetchCSV(name)
      .then(function(text) {
        var rows=parseCSV(text);
        var records=processCSVRows(rows);
        if (records.length>0) newData[name]=records;
      })
      .catch(function(){})
      .then(function(){ done++; document.getElementById('loadingSub').textContent='Carregando '+done+'/'+total+'...'; });
  });

  Promise.all(promises).then(function() {
    document.getElementById('loadingOverlay').classList.add('hidden');
    btn.classList.remove('syncing');

    if (Object.keys(newData).length === 0) {
      btn.textContent = '✗ SHEETS';
      btn.style.borderColor='var(--red)'; btn.style.color='var(--red)';
      setTimeout(function(){ btn.textContent='↓ SHEETS'; btn.style.borderColor='var(--green)'; btn.style.color='var(--green)'; },3000);
      return;
    }

    ESCALA_DATA = newData;
    presencaMap = {}; selectedSheet = '';
    document.getElementById('lista-section').style.display='none';
    var loaded = Object.keys(ESCALA_DATA).length;
    document.getElementById('fileBadge').textContent = '✓ '+loaded+' guias';
    document.getElementById('lastSync').textContent = 'Google Sheets — '+loaded+' guias — '+new Date().toLocaleTimeString('pt-BR');
    btn.textContent = '✓ SHEETS';
    setTimeout(function(){ btn.textContent='↓ SHEETS'; },3000);
    saveXlsxToFirebase('google-sheets-sync');
    populateSheetSelect();
    // auto-select first
    var first = Object.keys(ESCALA_DATA)[0];
    if (first) { selectedSheet=first; updateTurnoCounts(); refreshLista(); }
  });
}

function initTheme() {
  var saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
}
